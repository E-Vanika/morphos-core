name: Deploy portfolio
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  migrate-database:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v2
      - run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
      - run: supabase db push --linked
  deploy-vercel:
    needs: migrate-database
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
      ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
      CRAFTS_BUCKET: ${{ secrets.CRAFTS_BUCKET }}
      BRIDAL_BUCKET: ${{ secrets.BRIDAL_BUCKET }}
      NEXT_PUBLIC_INSTAGRAM_URL: ${{ secrets.NEXT_PUBLIC_INSTAGRAM_URL }}
      NEXT_PUBLIC_WHATSAPP_NUMBER: ${{ secrets.NEXT_PUBLIC_WHATSAPP_NUMBER }}
      NEXT_PUBLIC_ART_IMAGE_URL: ${{ secrets.NEXT_PUBLIC_ART_IMAGE_URL }}
      NEXT_PUBLIC_BRIDAL_IMAGE_URL: ${{ secrets.NEXT_PUBLIC_BRIDAL_IMAGE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install
      - name: Deploy application to Vercel
        run: |
          runtime_vars=(
            "SUPABASE_URL=$SUPABASE_URL"
            "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
            "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY"
            "GEMINI_API_KEY=$GEMINI_API_KEY"
            "MCP_API_KEY=$MCP_API_KEY"
            "ADMIN_EMAILS=$ADMIN_EMAILS"
            "LOG_LEVEL=INFO"
            "CRAFTS_BUCKET=$CRAFTS_BUCKET"
            "BRIDAL_BUCKET=$BRIDAL_BUCKET"
            "DOMAIN_PRESET=professional-services"
            "NEXT_PUBLIC_SUPABASE_URL=$SUPABASE_URL"
            "NEXT_PUBLIC_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
            "NEXT_PUBLIC_API_URL=/api"
            "NEXT_PUBLIC_INSTAGRAM_URL=$NEXT_PUBLIC_INSTAGRAM_URL"
            "NEXT_PUBLIC_WHATSAPP_NUMBER=$NEXT_PUBLIC_WHATSAPP_NUMBER"
            "NEXT_PUBLIC_ART_IMAGE_URL=$NEXT_PUBLIC_ART_IMAGE_URL"
            "NEXT_PUBLIC_BRIDAL_IMAGE_URL=$NEXT_PUBLIC_BRIDAL_IMAGE_URL"
          )
          build_vars=(
            "NEXT_PUBLIC_SUPABASE_URL=$SUPABASE_URL"
            "NEXT_PUBLIC_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
            "NEXT_PUBLIC_API_URL=/api"
            "NEXT_PUBLIC_INSTAGRAM_URL=$NEXT_PUBLIC_INSTAGRAM_URL"
            "NEXT_PUBLIC_WHATSAPP_NUMBER=$NEXT_PUBLIC_WHATSAPP_NUMBER"
            "NEXT_PUBLIC_ART_IMAGE_URL=$NEXT_PUBLIC_ART_IMAGE_URL"
            "NEXT_PUBLIC_BRIDAL_IMAGE_URL=$NEXT_PUBLIC_BRIDAL_IMAGE_URL"
          )
          args=()
          for value in "${runtime_vars[@]}"; do args+=(--env "$value"); done
          for value in "${build_vars[@]}"; do args+=(--build-env "$value"); done
          deploy_site() {
            local project_name="$1"
            local site_kind="$2"
            rm -rf .vercel
            npx vercel deploy --prod --yes --name "$project_name" --token "$VERCEL_TOKEN" "${args[@]}" --env "NEXT_PUBLIC_SITE_KIND=$site_kind" --build-env "NEXT_PUBLIC_SITE_KIND=$site_kind"
          }
          deploy_site crafts-by-vani craft
          deploy_site monika-glamup bridal
